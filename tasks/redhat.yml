- name: Import the CVMFS rpm gpg key
  ansible.builtin.rpm_key:
    key: "https://cvmrepo.web.cern.ch/cvmrepo/yum/RPM-GPG-KEY-CernVM-2048"
    state: present
  register: cvmfs_cernrepokey

- name: Install cvmfs-release
  ansible.builtin.dnf:
    name: "https://cvmrepo.web.cern.ch/cvmrepo/yum/cvmfs-release-latest.noarch.rpm"
    state: present

- name: Copy in cernvm.repo if get_url from cvmrepo.web.cern.ch fails
  ansible.builtin.copy:
    src: cernvm.repo
    dest: /etc/yum.repos.d/cernvm.repo
    mode: '0644'
  when: cvmfs_cernrepo is failed

# TODO?
